syntax = "proto3";

package dbbridge.v1;

option go_package = "github.com/ekalinin/dbbridge/internal/gen/api/proto/dbbridge/v1;dbbridgev1";

service QueryService {
  rpc StartQuery(StartQueryRequest) returns (StartQueryResponse);
  rpc GetQueryStatus(GetQueryStatusRequest) returns (GetQueryStatusResponse);
  rpc StopQuery(StopQueryRequest) returns (StopQueryResponse);
  rpc GetQueryStats(GetQueryStatsRequest) returns (GetQueryStatsResponse);
  rpc DownloadResult(DownloadResultRequest) returns (stream DownloadResultResponse);
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);
  rpc CanIBeStopped(CanIBeStoppedRequest) returns (CanIBeStoppedResponse);
  rpc WatchQuery(WatchQueryRequest) returns (stream WatchQueryResponse);
}

enum QueryState {
  QUERY_STATE_UNSPECIFIED = 0;
  QUERY_STATE_PENDING = 1;
  QUERY_STATE_RUNNING = 2;
  QUERY_STATE_SUCCEEDED = 3;
  QUERY_STATE_FAILED = 4;
  QUERY_STATE_CANCELED = 5;
  QUERY_STATE_EXPIRED = 6;
}

message QueryOptions {
  int64 timeout_ms = 1;         // 0 = no limit
  string mode = 2;               // "async" or "sync"
  int64 result_ttl_seconds = 3;  // default 86400 (24h)
  string idempotency_key = 4;
  string result_format = 5;      // "jsonl", "csv", "parquet"
  string storage_backend = 6;    // override default storage
}

message QueryError {
  string code = 1;
  string message = 2;
  bool retryable = 3;
}

message QueryStats {
  int64 rows_read = 1;
  int64 bytes_written = 2;
  int64 db_exec_duration_ms = 3;
  int64 storage_write_duration_ms = 4;
  int64 total_duration_ms = 5;
  int32 retries = 6;
}

message ResultRef {
  string backend = 1;
  string locator = 2;
  int64 size_bytes = 3;
  int64 row_count = 4;
  string format = 5;
  string checksum = 6;
}

message QueryRecord {
  string id = 1;
  string database_id = 2;
  string sql = 3;
  QueryOptions options = 4;
  QueryState state = 5;
  string owner_instance_id = 6;
  int64 created_at_ms = 7;
  int64 started_at_ms = 8;
  int64 finished_at_ms = 9;
  QueryError error = 10;
  QueryStats stats = 11;
  ResultRef result = 12;
  string idempotency_key = 13;
  int64 lease_deadline_ms = 14;
}

message DatabaseInfo {
  string id = 1;
  string engine = 2;
  string display_name = 3;
  bool healthy = 4;
}

message StartQueryRequest {
  string database_id = 1;
  string sql = 2;
  QueryOptions options = 3;
}

message StartQueryResponse {
  QueryRecord record = 1;
}

message GetQueryStatusRequest {
  string query_id = 1;
}

message GetQueryStatusResponse {
  QueryRecord record = 1;
}

message StopQueryRequest {
  string query_id = 1;
}

message StopQueryResponse {
  string query_id = 1;
  string status = 2;
}

message GetQueryStatsRequest {
  string query_id = 1;
}

message GetQueryStatsResponse {
  QueryStats stats = 1;
}

message DownloadResultRequest {
  string query_id = 1;
  int64 offset_bytes = 2;
  int64 limit_bytes = 3;
}

message DownloadResultResponse {
  bytes chunk = 1;
}

message ListDatabasesRequest {}

message ListDatabasesResponse {
  repeated DatabaseInfo databases = 1;
}

message ReloadConfigRequest {}

message ReloadConfigResponse {
  bool success = 1;
  string message = 2;
}

message CanIBeStoppedRequest {}

message CanIBeStoppedResponse {
  bool can_be_stopped = 1;
  int32 in_flight_count = 2;
}

message WatchQueryRequest {
  string query_id = 1;
}

message WatchQueryResponse {
  string query_id = 1;
  QueryState state = 2;
  QueryStats stats = 3;
  QueryError error = 4;
}
