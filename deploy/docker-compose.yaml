services:
  redis:
    image: redis:7-alpine
    container_name: dbbridge-redis
    ports:
      - "6379:6379"

  # Sample target database (dvdrental) for manual testing against dbbridge
  postgres:
    image: postgres:18-alpine
    container_name: dvdrental-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dvdrental
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      # SQL dump is executed automatically on first DB initialization
      - ./pg-sample/dvdrental.sql:/docker-entrypoint-initdb.d/dvdrental.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dvdrental"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: dbbridge-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  # We use a helper container to automatically create the "dbbridge" bucket in Minio
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for Minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing myminio/dbbridge;
      /usr/bin/mc anonymous set public myminio/dbbridge;
      exit 0;
      "

  dbbridge-blue:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dbbridge-blue
    ports:
      - "8081:8080" # REST API port mapped to 8081 on host
      - "9091:9090" # gRPC port mapped to 9091 on host
    environment:
      - REDIS_ADDR=redis:6379
    volumes:
      - ./configs/dbbridge-blue.yaml:/app/configs/dbbridge.yaml
    depends_on:
      - redis
      - minio
      - postgres

  dbbridge-green:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: dbbridge-green
    ports:
      - "8082:8080" # REST API port mapped to 8082 on host
      - "9092:9090" # gRPC port mapped to 9092 on host
    environment:
      - REDIS_ADDR=redis:6379
    volumes:
      - ./configs/dbbridge-green.yaml:/app/configs/dbbridge.yaml
    depends_on:
      - redis
      - minio
      - postgres

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dbbridge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - dbbridge-blue
      - dbbridge-green

volumes:
  pgdata:
