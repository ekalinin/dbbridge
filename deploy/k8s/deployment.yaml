apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbbridge
  namespace: default
  labels:
    app: dbbridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dbbridge
  template:
    metadata:
      labels:
        app: dbbridge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: dbbridge
          image: dbbridge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: rest
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/dbbridge
              readOnly: true
          args:
            - -config=/etc/dbbridge/dbbridge.yaml
          livenessProbe:
            httpGet:
              path: /healthz
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: rest
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: dbbridge-config
