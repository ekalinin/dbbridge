apiVersion: v1
kind: Service
metadata:
  name: dbbridge
  namespace: default
  labels:
    app: dbbridge
spec:
  type: ClusterIP
  selector:
    app: dbbridge
  ports:
    # REST API and WebSocket (/v1/ws) share this port
    - name: rest
      port: 8080
      targetPort: rest
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
