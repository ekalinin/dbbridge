apiVersion: v1
kind: ConfigMap
metadata:
  name: dbbridge-config
  namespace: default
data:
  dbbridge.yaml: |
    instance:
      id: dbbridge-$(POD_NAME)
      metastore: redis
      redis_addr: "redis:6379"
      redis_password: ""
      redis_db: 0
      default_storage: s3
      heartbeat_ttl: 5s

    server:
      rest_addr: ":8080"
      grpc_addr: ":9090"

    defaults:
      result_ttl: 24h
      query_timeout: 0s

    storage:
      fs:
        root: "/data/results"
      s3:
        bucket: "dbbridge"
        region: "us-east-1"
        endpoint: ""
        access_key_id: ""
        secret_access_key: ""

    databases: []
