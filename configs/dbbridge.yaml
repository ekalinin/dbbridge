instance:
  id: dbbridge-blue
  metastore: memory   # "redis" or "memory"
  redis_addr: "redis:6379"
  redis_password: ""
  redis_db: 0
  default_storage: fs
  heartbeat_ttl: 5s

server:
  rest_addr: ":8080"
  grpc_addr: ":9090"

defaults:
  result_ttl: 24h
  query_timeout: 0s

storage:
  fs:
    root: "./results"
  s3:
    bucket: "dbbridge"
    region: "us-east-1"
    endpoint: "http://minio:9000"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"

databases:
  - id: pg_test
    engine: postgres
    dsn: "postgres://postgres:postgres@postgres:5423/postgres?sslmode=disable"
    display_name: "PostgreSQL Production Main"
    max_conns: 10

  - id: mysql_test
    engine: mysql
    dsn: "root:root@tcp(mysql:3306)/mysql"
    display_name: "MySQL Replica"
    max_conns: 5
